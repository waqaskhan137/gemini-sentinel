services:
  gemini-sentinel:
    build: .
    container_name: gemini-sentinel
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host:ro
      - ./logs:/var/log/sentinel
      - ./STATUS.md:/app/STATUS.md # Mount the status file for writing
    command: /usr/local/bin/sentinel
    restart: "no"
