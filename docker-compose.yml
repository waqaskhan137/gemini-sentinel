services:
  gemini-sentinel:
    build: .
    container_name: gemini-sentinel
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Removed :ro to allow 'fixing' (restarting containers)
      - /:/host:ro # Kept :ro for safety; AI scans the host but cannot delete host files
      - ./logs:/var/log/sentinel
    command: /usr/local/bin/sentinel
    restart: "no"
